server {
    listen 80 default_server;
    server_name 10.0.64.53;

    charset utf-8;
    client_max_body_size 128M;
    absolute_redirect off;

    access_log /var/log/nginx/qa_drupal_access.log;
    error_log  /var/log/nginx/qa_drupal_error.log warn;

    # =========================================================
    # 🔹 GZIP
    # =========================================================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # =========================================================
    # 🔹 SITIO RAIZ — Landing con listado de proyectos
    # =========================================================

    location = / {
        root /var/www/html/qa;
        try_files /qa-index.html =404;
        access_log off;
    }

    # =========================================================
    # 🔹 CORBETA TEXTILES — Angular + Drupal
    # =========================================================

    location = /corbeta_textiles {
        return 301 /corbeta_textiles/;
    }

    location = /corbeta_textiles_admin {
        return 301 /corbeta_textiles_admin/;
    }

    location ^~ /corbeta_textiles_admin/ {

        alias /var/www/vhost/corbeta_textiles_admin/;
        index index.php;

        # Front controller (Drupal)
        try_files $uri $uri/ @corbeta_textiles_admin;

        # =========================
        # ESTÁTICOS
        # =========================
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public";
        }

        # =========================
        # SEGURIDAD
        # =========================
        location ~* \.(txt|log|sql|yml|yaml|ini)$ {
            deny all;
        }

        location ~ ^/corbeta_textiles_admin/private/ {
            deny all;
        }

        # =========================
        # PHP directo
        # =========================
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;

            fastcgi_param SCRIPT_FILENAME /var/www/vhost/corbeta_textiles_admin/index.php;
            fastcgi_param SCRIPT_NAME     /corbeta_textiles_admin/index.php;

            fastcgi_param REQUEST_URI     $request_uri;
            fastcgi_param QUERY_STRING    $query_string;
            fastcgi_param HTTP_HOST       $host;
            fastcgi_param HTTPS           off;
            fastcgi_param SERVER_PORT     $server_port;
        }
    }

    location @corbeta_textiles_admin {

        include fastcgi_params;
        fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;

        fastcgi_param SCRIPT_FILENAME /var/www/vhost/corbeta_textiles_admin/index.php;
        fastcgi_param SCRIPT_NAME     /corbeta_textiles_admin/index.php;

        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_param HTTP_HOST       $host;
        fastcgi_param HTTPS           off;
        fastcgi_param SERVER_PORT     $server_port;
    }

    location ^~ /corbeta_textiles/ {
        alias /var/www/vhost/corbeta_textiles/dist/textiles/;

        try_files $uri $uri/ /corbeta_textiles/index.html;

        sub_filter '<base href="/">' '<base href="/corbeta_textiles/">';
        sub_filter_once on;
        sub_filter_types text/html;

        expires 1h;
        add_header Cache-Control "public, max-age=3600";

        access_log off;
    }

    # =========================================================
    # 🔹 REDIRECT /proyecto → /proyecto/
    # =========================================================

    location ~ ^/(?<project>agendatucita-alkomprar|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)$ {
        return 301 /$project/;
    }

    # =========================================================
    # 🔥 IMAGE STYLES (DRUPAL)
    # =========================================================

    location ~* ^/(?<project>agendatucita-alkomprar|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)/sites/default/files/styles(?<path>/.*)$ {

        root /var/www/vhost;

        try_files /$project/web/sites/default/files/styles$path /$project/web/index.php?$query_string;

        add_header Cache-Control "public, max-age=31536000";
    }

    # =========================================================
    # 🔥 FILES NORMALES
    # =========================================================

    location ~* ^/(?<project>agendatucita-alkomprar|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)/sites/default/files(?<path>/.*)$ {

        root /var/www/vhost;

        try_files /$project/web/sites/default/files$path =404;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";

        access_log off;
    }

    # =========================================================
    # 🔥 ASSETS DRUPAL SIN PREFIJO (/themes, /core, etc.)
    # =========================================================

    location ~* ^/(themes|core|modules|libraries)/.+\.(js|css|woff|woff2|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|map)$ {

        root /var/www/vhost;

        try_files
            /agendatucita-alkomprar/web$uri
            /dongfeng/web$uri
            /ganaconkalley/web$uri
            /invoice/web$uri
            /kalleymovil/web$uri
            /knowledgebase/web$uri
            /landingdescargas/web$uri
            /midia/web$uri
            /narinenseslomaximo/web$uri
            /pidetucita_alkomprar/web$uri
            /redcontigo/web$uri
            /servicios_kalley/web$uri
            /servicios_tcl/web$uri
            =404;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";

        access_log off;
    }

    # =========================================================
    # 🔹 ESTÁTICOS POR PROYECTO
    # =========================================================

    location ~* ^/(?<project>agendatucita-alkomprar|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)(?<path>/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp|map))$ {

        root /var/www/vhost;

        try_files /$project/web$path /$project/web/index.php?$query_string;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";

        access_log off;
    }

    # =========================================================
    # 🔹 WEBFORM
    # =========================================================

    location ~* ^/(?<project>agendatucita-alkomprar|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)/system/files/webform/ {
        root /var/www/vhost;
        try_files $uri /$project/web/index.php?$query_string;
    }

    # =========================================================
    # 🔹 DRUPAL CORE
    # =========================================================

    location ~ ^/(?<project>agendatucita-alkomprar|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl) {

        root /var/www/vhost;

        try_files $uri /$project/web/index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;

            fastcgi_param SCRIPT_FILENAME /var/www/vhost/$project/web/index.php;
            fastcgi_param SCRIPT_NAME     /$project/index.php;
            fastcgi_param DOCUMENT_ROOT   /var/www/vhost/$project/web;

            fastcgi_param HTTPS off;
            fastcgi_param SERVER_PORT 80;

            fastcgi_read_timeout 300;
        }
    }

    # =========================================================
    # 🔹 FALLBACK DRUPAL CORBETA
    # =========================================================

    location @corbeta_drupal {
        include fastcgi_params;
        fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;

        fastcgi_param SCRIPT_FILENAME /var/www/vhost/corbeta_textiles/dist/textiles/drupal/index.php;
        fastcgi_param SCRIPT_NAME     /corbeta_textiles/drupal/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/vhost/corbeta_textiles/dist/textiles/drupal;
    }

    # =========================================================
    # 🔒 SEGURIDAD
    # =========================================================

    location ~ /\.                     { deny all; }
    location ~ ^/[^/]+/vendor/         { deny all; }
    location ~ ^/[^/]+/\.git           { deny all; }
    location ~* composer\.(json|lock)$ { deny all; }
    location ~* /sites/.+/private/     { deny all; }
}

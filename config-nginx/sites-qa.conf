server {
    listen 80 default_server;
    server_name 10.0.64.53;

    charset utf-8;
    client_max_body_size 128M;
    absolute_redirect off;

    access_log /var/log/nginx/qa_drupal_access.log;
    error_log  /var/log/nginx/qa_drupal_error.log warn;

    # =========================================================
    # 🔹 CORBETA TEXTILES — Angular SPA + Drupal interno
    # =========================================================

    location = /corbeta_textiles {
        return 301 /corbeta_textiles/;
    }

    # Drupal interno (prioridad alta)
    location ^~ /corbeta_textiles/drupal {
        root /var/www/vhost/corbeta_textiles/dist/textiles;

        rewrite ^/corbeta_textiles(/.*)$ $1 break;

        try_files $uri @corbeta_drupal;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;

            fastcgi_param SCRIPT_FILENAME /var/www/vhost/corbeta_textiles/dist/textiles/drupal/index.php;
            fastcgi_param SCRIPT_NAME     /corbeta_textiles/drupal/index.php;
            fastcgi_param DOCUMENT_ROOT   /var/www/vhost/corbeta_textiles/dist/textiles/drupal;

            fastcgi_param HTTPS off;
            fastcgi_param SERVER_PORT 80;

            fastcgi_read_timeout      300;
            fastcgi_buffer_size       128k;
            fastcgi_buffers           4 256k;
            fastcgi_busy_buffers_size 256k;
        }
    }

    # Angular SPA
    location ^~ /corbeta_textiles/ {
        alias /var/www/vhost/corbeta_textiles/dist/textiles/;

        try_files $uri $uri/ /corbeta_textiles/index.html;

        sub_filter '<base href="/">' '<base href="/corbeta_textiles/">';
        sub_filter_once on;
        sub_filter_types text/html;

        expires 1h;
        access_log off;
    }

    # =========================================================
    # 🔹 REDIRECT /proyecto → /proyecto/
    # =========================================================

    location ~ ^/(?<project>akt-motos|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)$ {
        return 301 /$project/;
    }

    # =========================================================
    # 🔹 ARCHIVOS ESTÁTICOS + IMAGE STYLES (CLAVE)
    # =========================================================

    location ~* ^/(?<project>akt-motos|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)(?<path>/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp|map))$ {

        root /var/www/vhost;

        # 🔥 Permite servir archivo o generarlo vía Drupal (image styles)
        try_files /$project/web$path /$project/web/index.php?$query_string;

        expires max;
        access_log off;
    }

    # =========================================================
    # 🔹 WEBFORM FILES (AJUSTE DRUPAL 11)
    # =========================================================

    location ~* ^/(?<project>akt-motos|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)/system/files/webform/ {
        root /var/www/vhost;
        try_files $uri /$project/web/index.php?$query_string;
    }

    # =========================================================
    # 🔹 MULTI-DRUPAL CORE
    # =========================================================

    location ~ ^/(?<project>akt-motos|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl) {

        root /var/www/vhost;

        # Clean URLs Drupal 11
        try_files $uri /$project/web/index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;

            fastcgi_param SCRIPT_FILENAME /var/www/vhost/$project/web/index.php;
            fastcgi_param SCRIPT_NAME     /$project/index.php;
            fastcgi_param DOCUMENT_ROOT   /var/www/vhost/$project/web;

            fastcgi_param HTTPS off;
            fastcgi_param SERVER_PORT 80;

            fastcgi_read_timeout      300;
            fastcgi_buffer_size       128k;
            fastcgi_buffers           4 256k;
            fastcgi_busy_buffers_size 256k;
        }
    }

    # =========================================================
    # 🔹 FALLBACK DRUPAL CORBETA
    # =========================================================

    location @corbeta_drupal {
        include fastcgi_params;
        fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;

        fastcgi_param SCRIPT_FILENAME /var/www/vhost/corbeta_textiles/dist/textiles/drupal/index.php;
        fastcgi_param SCRIPT_NAME     /corbeta_textiles/drupal/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/vhost/corbeta_textiles/dist/textiles/drupal;

        fastcgi_param HTTPS off;
        fastcgi_param SERVER_PORT 80;
    }

    # =========================================================
    # 🔒 SEGURIDAD
    # =========================================================

    location ~ /\.                     { deny all; }
    location ~ ^/[^/]+/vendor/         { deny all; }
    location ~ ^/[^/]+/\.git           { deny all; }
    location ~* composer\.(json|lock)$ { deny all; }
    location ~* /sites/.+/private/     { deny all; }
}

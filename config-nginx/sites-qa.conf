server {
    listen 80 default_server;
    server_name 10.0.64.53;

    charset utf-8;
    client_max_body_size 128M;
    absolute_redirect off;

    access_log /var/log/nginx/qa_drupal_access.log;
    error_log  /var/log/nginx/qa_drupal_error.log warn;

    # corbeta_textiles — Angular SPA + Drupal en /drupal/
    location = /corbeta_textiles {
        return 301 /corbeta_textiles/;
    }

    # Drupal sin web/ — tiene prioridad sobre el SPA
    location ^~ /corbeta_textiles/drupal {
        root /var/www/vhost/corbeta_textiles/dist/textiles;
        rewrite ^/corbeta_textiles(/.*)$ $1 break;
        try_files $uri @corbeta_drupal;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/vhost/corbeta_textiles/dist/textiles/drupal/index.php;
            fastcgi_param SCRIPT_NAME     /corbeta_textiles/drupal/index.php;
            fastcgi_param DOCUMENT_ROOT   /var/www/vhost/corbeta_textiles/dist/textiles/drupal;
            fastcgi_param HTTPS           off;
            fastcgi_param SERVER_PORT     80;
            fastcgi_read_timeout      300;
            fastcgi_buffer_size       128k;
            fastcgi_buffers           4 256k;
            fastcgi_busy_buffers_size 256k;
        }
    }

    # Angular SPA
    location ^~ /corbeta_textiles/ {
        alias /var/www/vhost/corbeta_textiles/dist/textiles/;
        try_files $uri $uri/ /corbeta_textiles/index.html;
        sub_filter '<base href="/">' '<base href="/corbeta_textiles/">';
        sub_filter_once on;
        sub_filter_types text/html;
        expires 1h;
        access_log off;
    }

    # Redirect /proyecto → /proyecto/
    location ~ ^/(?<project>akt-motos|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl)$ {
        return 301 /$project/;
    }

    # Multi-proyecto Drupal 11
    location ~ ^/(?<project>akt-motos|dongfeng|ganaconkalley|invoice|kalleymovil|knowledgebase|landingdescargas|midia|narinenseslomaximo|pidetucita_alkomprar|redcontigo|servicios_kalley|servicios_tcl) {

        root /var/www/vhost;

        # 1. Archivos estáticos
        # alias resuelve /proyecto/ruta → /var/www/vhost/proyecto/web/ruta
        # Sin try_files para que nginx detecte el MIME type correctamente desde la URI
        location ~* ^/[^/]+/(?<subpath>.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp|map))$ {
            alias /var/www/vhost/$project/web/$subpath;
            expires max;
            access_log off;
        }

        # 2. Drupal 11 Clean URLs
        # Si no es archivo real, va al index.php del proyecto
        try_files $uri /$project/web/index.php?$query_string;

        # 3. PHP-FPM — PHP 8.3
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;

            fastcgi_param SCRIPT_FILENAME /var/www/vhost/$project/web/index.php;
            fastcgi_param SCRIPT_NAME     /$project/index.php;
            fastcgi_param DOCUMENT_ROOT   /var/www/vhost/$project/web;
            fastcgi_param HTTPS           off;
            fastcgi_param SERVER_PORT     80;

            fastcgi_read_timeout      300;
            fastcgi_buffer_size       128k;
            fastcgi_buffers           4 256k;
            fastcgi_busy_buffers_size 256k;
        }
    }

    # Workaround: Angular corbeta_textiles — assets solicitados desde raíz sin prefijo
    location ~* ^/[^/]+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|webp|map)$ {
        root /var/www/vhost/corbeta_textiles/dist/textiles;
        try_files $uri =404;
        expires 1h;
        access_log off;
    }

    # Workaround: assets Drupal con rutas absolutas (sin prefijo /proyecto/)
    # Busca el archivo en el webroot de cada proyecto hasta encontrarlo
    location ~* ^/(themes|core|modules|sites)/.+\.(js|css|woff|woff2|ttf|otf|eot|png|jpg|jpeg|gif|ico|svg|webp|map)$ {
        root /var/www/vhost;
        try_files
            /akt-motos/web$uri
            /dongfeng/web$uri
            /ganaconkalley/web$uri
            /invoice/web$uri
            /kalleymovil/web$uri
            /knowledgebase/web$uri
            /landingdescargas/web$uri
            /midia/web$uri
            /narinenseslomaximo/web$uri
            /pidetucita_alkomprar/web$uri
            /redcontigo/web$uri
            /servicios_kalley/web$uri
            /servicios_tcl/web$uri
            =404;
        expires max;
        access_log off;
    }

    # PHP fallback para Drupal de corbeta_textiles
    location @corbeta_drupal {
        include fastcgi_params;
        fastcgi_pass unix:/var/opt/remi/php83/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/vhost/corbeta_textiles/dist/textiles/drupal/index.php;
        fastcgi_param SCRIPT_NAME     /corbeta_textiles/drupal/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/vhost/corbeta_textiles/dist/textiles/drupal;
        fastcgi_param HTTPS           off;
        fastcgi_param SERVER_PORT     80;
        fastcgi_read_timeout      300;
        fastcgi_buffer_size       128k;
        fastcgi_buffers           4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Bloqueos de seguridad
    location ~ /\.                     { deny all; }
    location ~ ^/[^/]+/vendor/         { deny all; }
    location ~ ^/[^/]+/\.git           { deny all; }
    location ~* composer\.(json|lock)$ { deny all; }
    location ~* /sites/.+/private/     { deny all; }
}
